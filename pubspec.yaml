name: openpay_bbva
description: A Flutter plugin for iOS and Android that tokenizes payments via the Openpay BBVA platform. Supports Web, Windows, macOS, and Linux for card tokenization via HTTP.
version: 1.2.2
homepage: https://github.com/FMarcelFC/openpay_bbva

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.19.0"

platforms:
  android:
  ios:
  web:
  windows:
  macos:
  linux:

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.fortune.openpay_bbva
        pluginClass: OpenpayBbvaPlugin
        fileName: openpay_bbva.dart
      ios:
        pluginClass: OpenpayBbvaPlugin
        fileName: openpay_bbva.dart
